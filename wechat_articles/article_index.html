<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公众号文章收藏索引</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --orange: #d29922;
      --purple: #bc8cff;
      --pink: #f778ba;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 30px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .header h1 span {
      color: var(--accent);
    }

    .header p {
      color: var(--text2);
      margin-top: 8px;
      font-size: 14px;
    }

    /* Search & Filter Bar */
    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      padding: 16px;
      background: var(--surface);
      border-radius: 10px;
      border: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      margin-bottom: 20px;
    }

    .search-box {
      flex: 1;
      min-width: 220px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 10px 14px 10px 38px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
    }

    .search-box input:focus {
      border-color: var(--accent);
    }

    .search-box::before {
      content: "🔍";
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    /* Tag filters */
    .tag-filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag-btn {
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      transition: all .2s;
      white-space: nowrap;
    }

    .tag-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .tag-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
    }

    .clear-btn {
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--orange);
      transition: all .2s;
    }

    .clear-btn:hover {
      background: var(--orange);
      color: #fff;
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--text2);
    }

    .stats b {
      color: var(--accent);
      font-size: 18px;
    }

    /* Topic Nav */
    .topic-nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .topic-nav a {
      padding: 8px 18px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 14px;
      transition: all .2s;
    }

    .topic-nav a:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    /* ========== Article Cards with Collapse ==========
  /* Article Card */
    .article-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 20px;
      transition: border-color .3s, box-shadow .3s;
      overflow: hidden;
    }

    .article-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(88, 166, 255, .15);
    }

    .article-card.hidden {
      display: none;
    }

    /* Card Summary (always visible) — the "compact" view */
    .card-summary {
      padding: 20px 24px;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      user-select: none;
    }

    .card-summary:hover {
      background: rgba(88, 166, 255, .03);
    }

    .card-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      min-width: 30px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .card-summary-body {
      flex: 1;
      min-width: 0;
    }

    .card-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.4;
    }

    .expand-icon {
      width: 32px;
      height: 32px;
      min-width: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--text2);
      transition: all .3s ease;
      flex-shrink: 0;
    }

    .article-card.expanded .expand-icon {
      transform: rotate(180deg);
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .card-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 8px;
    }

    .card-tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .tag-ai {
      background: #1f3a5f;
      color: #79c0ff;
    }

    .tag-financial {
      background: #1a3a2a;
      color: #56d364;
    }

    .tag-quant {
      background: #3a2a1a;
      color: #e3b341;
    }

    .tag-llm {
      background: #3a1a3a;
      color: #d2a8ff;
    }

    .tag-futures {
      background: #1a2a3a;
      color: #58a6ff;
    }

    .tag-tool {
      background: #2a2a2a;
      color: #b0b0b0;
    }

    .card-summary-text {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .repo-hint {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
      font-size: 12px;
      color: var(--green);
      opacity: .8;
    }

    /* Card Detail (collapsible) */
    .card-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height .35s ease-out, opacity .25s;
      opacity: 0;
      border-top: 1px solid transparent;
    }

    .article-card.expanded .card-detail {
      max-height: 3000px;
      transition: max-height .5s ease-in, opacity .3s .1s;
      opacity: 1;
      border-top: 1px solid var(--border);
    }

    .card-detail-inner {
      padding: 20px 24px;
    }

    /* Action bar inside detail */
    .action-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }

    .action-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 16px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: all .2s;
    }

    .action-primary {
      background: rgba(88, 166, 255, .12);
      color: var(--accent);
      border: 1px solid rgba(88, 166, 255, .25);
    }

    .action-primary:hover {
      background: rgba(88, 166, 255, .2);
    }

    .action-secondary {
      background: rgba(139, 148, 158, .08);
      color: var(--text2);
      border: 1px solid var(--border);
    }

    .action-secondary:hover {
      border-color: var(--text2);
      color: var(--text);
    }

    /* Key points */
    .key-points {
      margin: 14px 0;
      padding-left: 4px;
    }

    .key-points li {
      margin-bottom: 6px;
      list-style-position: inside;
      color: var(--text2);
      font-size: 13.5px;
    }

    .key-points strong {
      color: var(--text);
    }

    /* Repos table */
    .repo-section {
      margin-top: 18px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--text);
    }

    .repo-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
    }

    .repo-table th {
      text-align: left;
      padding: 8px 12px;
      background: rgba(88, 166, 255, .08);
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .repo-table td {
      padding: 8px 12px;
      border-bottom: 1px solid rgba(48, 54, 61, .5);
      vertical-align: middle;
    }

    .repo-table tr:hover td {
      background: rgba(88, 166, 255, .04);
    }

    .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }

    .status-ok {
      background: rgba(63, 185, 80, .15);
      color: var(--green);
    }

    .status-pending {
      background: rgba(210, 153, 34, .15);
      color: var(--orange);
    }

    .repo-link {
      color: var(--accent);
      text-decoration: none;
    }

    .repo-link:hover {
      text-decoration: underline;
    }

    .local-path {
      font-family: "Cascadia Code", "Consolas", "Monaco", monospace;
      font-size: 11.5px;
      color: var(--text2);
    }

    /* Evaluation box */
    .eval-box {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      background: rgba(88, 166, 255, .05);
      font-size: 13px;
      line-height: 1.65;
    }

    .eval-box strong {
      color: var(--accent);
    }

    /* No results */
    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
      font-size: 16px;
      display: none;
    }

    .no-results.show {
      display: block;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 30px 0;
      color: var(--text2);
      font-size: 13px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    /* Scroll to top */
    .scroll-top {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 20px;
      opacity: 0;
      transition: opacity .3s;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .scroll-top.show {
      opacity: 1;
    }

    .scroll-top:hover {
      transform: scale(1.1);
    }

    /* Batch expand/collapse all */
    .batch-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .batch-btn {
      padding: 6px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      transition: all .2s;
    }

    .batch-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    @media (max-width:600px) {
      .card-summary {
        padding: 16px;
      }

      .card-detail-inner {
        padding: 16px;
      }

      .toolbar {
        padding: 12px;
      }
    }
  </style>
</head>

    const allTags = [...new Set(articles.flatMap(a => a.tags))];

    const tagColorMap = {
      "AI/大模型": "tag-ai", "金融时序": "tag-financial", "LLM": "tag-llm",
      "量化框架": "tag-quant", "期货CTP": "tag-futures", "工具": "tag-tool",
      "多智能体": "tag-ai", "架构设计": "tag-quant", "开源项目": "tag-tool",
      "智能体": "tag-ai", "交易心理": "tag-financial", "概率思维": "tag-quant",
      "风险管理": "tag-quant", "策略优化": "tag-quant", "技术指标": "tag-quant",
      "形态识别": "tag-quant", "金融数据": "tag-financial", "IM即时通讯": "tag-tool",
      "私有部署": "tag-tool", "企业级": "tag-tool"
    };
    function tagClass(tag) { return tagColorMap[tag] || ""; }

    // ========== 渲染 ==========
    function renderTagFilters() {
      document.getElementById('tagFilters').innerHTML = allTags.map(tag =>
        `<button class="tag-btn" data-tag="${tag}" onclick="toggleTag(this)">${tag}</button>`
      ).join('');
    }

    function renderTopicNav() {
      const topics = ["全部文章", ...allTags];
      document.getElementById('topicNav').innerHTML = topics.map((t, i) =>
        `<a href="#">${i === 0 ? '📋 ' : ''}${t}</a>`
      ).join('');
    }

    function renderArticles() {
      const container = document.getElementById('articlesContainer');
      container.innerHTML = articles.map(a => `
    <article class="article-card" data-id="${a.id}" data-tags="${a.tags.join(',').toLowerCase()}"
             data-text="${((a.title + ' ' + a.summary + ' ' + a.keyPoints.join(' ') + ' ' + a.account).toLowerCase()).replace(/"/g, '&quot;').replace(/'/g, '&#39;')}">

      <!-- 折叠视图：标题 + 简介（始终可见） -->
      <div class="card-summary" onclick="toggleCard(this)">
        <span class="card-num">#${a.id}</span>
        <div class="card-summary-body">
          <div class="card-title-row">
            <h2 class="card-title">${a.title}</h2>
            <span class="expand-icon">▼</span>
          </div>
          <div class="card-meta">
            <span style="color:var(--text2);font-size:12px;">📝 ${a.account}${a.author ? ' · ' + a.author : ''}</span>
            <span style="color:var(--text2);font-size:12px;">📅 ${a.date}</span>
            ${a.tags.map(t => `<span class="card-tag ${tagClass(t)}">${t}</span>`).join('')}
          </div>
          <p class="card-summary-text">${a.summary}</p>
          <div class="repo-hint">📦 ${a.repos.length} 个仓库 · 点击查看详情 ↓</div>
        </div>
      </div>

      <!-- 展开视图：原文链接 + 要点 + 仓库 + 评价（点击后显示） -->
      <div class="card-detail">
        <div class="card-detail-inner">

          <!-- 操作按钮栏 -->
          <div class="action-bar">
            <a href="${a.url}" target="_blank" class="action-link action-primary">🔗 阅读原文</a>
            ${a.repos.filter(r => r.status === 'ok').map(r =>
        `<a href="${r.github}" target="_blank" class="action-link action-secondary">⭐ 打开 ${r.name} GitHub</a>`
      ).join('')}
          </div>

          <!-- 要点列表 -->
          <ul class="key-points">
            ${a.keyPoints.map(p => `<li>${p}</li>`).join('')}
          </ul>

          <!-- 关联仓库表格 -->
          ${a.repos.length > 0 ? `
          <div class="repo-section">
            <div class="section-title">📦 关联仓库</div>
            <table class="repo-table">
              <thead><tr><th>名称</th><th>GitHub地址</th><th>本地路径</th><th>状态</th></tr></thead>
              <tbody>
                ${a.repos.map(r => `
                  <tr>
                    <td><strong>${r.name}</strong>${r.stars ? '<br><span style="color:var(--text2);font-size:10px">⭐' + r.stars + '</span>' : ''}</td>
                    <td><a href="${r.github}" target="_blank" class="repo-link">${r.github.replace('https://', '')}</a></td>
                    <td><code class="local-path">${r.localPath}</code></td>
                    <td><span class="status-badge ${r.status === 'ok' ? 'status-ok' : 'status-pending'}">${r.status === 'ok' ? '✅ 已Clone' : '⏳ 待Clone'}</span></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>` : ''}

          ${a.evaluation ? `
          <div class="eval-box">
            <strong>💡 与我的回测系统关联度：</strong>${a.evaluation}
          </div>` : ''}

        </div>
      </div>
    </article>
  `).join('');

      updateStats();
    }

    // ========== 折叠/展开逻辑 ==========
    function toggleCard(summaryEl) {
      const card = summaryEl.closest('.article-card');
      card.classList.toggle('expanded');
    }

    function expandAll() {
      document.querySelectorAll('.article-card').forEach(c => c.classList.add('expanded'));
    }

    function collapseAll() {
      document.querySelectorAll('.article-card').forEach(c => c.classList.remove('expanded'));
    }

    // ========== 筛选逻辑 ==========
    let activeTags = new Set();

    function toggleTag(btn) {
      const tag = btn.dataset.tag;
      if (activeTags.has(tag)) {
        activeTags.delete(tag);
        btn.classList.remove('active');
      } else {
        activeTags.add(tag);
        btn.classList.add('active');
      }
      filterCards();
    }

    function resetFilters() {
      activeTags.clear();
      document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('searchInput').value = '';
      filterCards();
    }

    function filterCards() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const cards = document.querySelectorAll('.article-card');
      let visible = 0;

      cards.forEach(card => {
        const searchText = card.dataset.text;
        const cardTags = card.dataset.tags;

        const tagMatch = activeTags.size === 0 || [...activeTags].every(t => cardTags.includes(t.toLowerCase()));
        const searchMatch = !query || searchText.includes(query);

        if (tagMatch && searchMatch) {
          card.classList.remove('hidden');
          visible++;
        } else {
          card.classList.add('hidden');
        }
      });

      document.getElementById('visibleCount').textContent = visible;
      document.getElementById('noResults').classList.toggle('show', visible === 0);
    }

    function updateStats() {
      const totalRepos = articles.flatMap(a => a.repos.filter(r => r.status === 'ok')).length;
      document.getElementById('totalCount').textContent = articles.length;
      document.getElementById('repoCount').textContent = totalRepos;
      document.getElementById('visibleCount').textContent = articles.length;
    }

    // ========== 回到顶部 ==========
    window.addEventListener('scroll', () => {
      document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 400);
    });

    // ========== 初始化 ==========
    renderTagFilters();
    renderTopicNav();
    renderArticles();
  </script>
</body>

</html>
